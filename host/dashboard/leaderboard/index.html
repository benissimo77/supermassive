<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboards - SuperMassive</title>
    <link rel="stylesheet" href="/css/dashboard.css">
        
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script type="module" src="/modules/dashboard.min.js" defer></script>
    <script type="module" src="/modules/dashboard-leaderboard.min.js" defer></script>
</head>
<body>
    <nav id="sidebar"></nav>

    <main>
        <div class="page-header">
            <h1>Leaderboards</h1>
            <p>Season rankings and all-time high scores across SuperMassive.</p>
        </div>

        <!-- All-time Global Leaderboard -->
        <div class="card">
            <div class="card-header">
                <div>
                    <h2>All-Time Global Leaderboard</h2>
                    <p class="card-subtitle">Top scorers across all verified games</p>
                </div>
            </div>
            <div class="card-body" id="leaderboard-global-container">
                <div class="leaderboard-status">Loading global rankings...</div>
            </div>
        </div>

        <div class="leaderboard-grid" id="leaderboard-grid">
            <!-- Public season leaderboards are injected here -->
        </div>
    </main>

    <!-- Templates -->
    <template id="lb-table-template">
        <table class="leaderboard">
            <thead>
                <tr>
                    <th class="lb-rank">#</th>
                    <th class="lb-avatar"></th>
                    <th class="lb-player">Player</th>
                    <th class="lb-num">Games</th>
                    <th class="lb-num">Qs</th>
                    <th class="lb-num">Correct</th>
                    <th class="lb-num">Accuracy</th>
                    <th class="lb-score">Points</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </template>

    <template id="lb-row-template">
        <tr data-rank="">
            <td class="lb-rank"></td>
            <td class="lb-avatar"><img src="" alt="" onerror="this.onerror=null;this.src='/img/default-avatar.png'"></td>
            <td class="lb-name"></td>
            <td class="lb-num lb-games"></td>
            <td class="lb-num lb-qs"></td>
            <td class="lb-num lb-correct"></td>
            <td class="lb-num lb-accuracy"></td>
            <td class="lb-score"></td>
        </tr>
    </template>

    <template id="season-card-template">
        <div class="card">
            <div class="card-header" style="border-left: 3px solid var(--clr-tertiary);">
                <div>
                    <h2 style="margin: 0;"></h2>
                    <p class="card-subtitle"></p>
                </div>
            </div>
            <div class="card-body"></div>
        </div>
    </template>

</body>
</html>
