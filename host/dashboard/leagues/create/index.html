<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create League - Hosting Dashboard</title>
  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="stylesheet" href="/css/quizbuilder.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script type="module" src="/modules/dashboard.min.js" defer></script>
</head>
<body class="dashboard-body">
  <div id="sidebar" class="sidebar"></div>

  <main>
    <div class="editor-header">
      <h1>Create League</h1>
      <a href="/host/dashboard/leagues/" class="btn btn-outline">
        <i class="fa-solid fa-arrow-left"></i>
        Back to Leagues
      </a>
    </div>

    <div class="card" style="max-width: 560px;">
      <div class="card-header">
        <svg class="collapse-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
        <h2>League Details</h2>
      </div>
      <div class="card-body">
        <form id="create-league-form">
          <div class="form-group" style="margin-bottom: 16px;">
            <label for="league-name" style="display:block; margin-bottom:6px; font-weight:600;">League Name <span style="color:var(--clr-error)">*</span></label>
            <input
              type="text"
              id="league-name"
              name="name"
              placeholder="e.g. Friday Night Quiz Crew"
              required
              maxlength="80"
              style="width:100%; box-sizing:border-box; padding:8px; border:1px solid var(--clr-line); border-radius:6px; background:var(--clr-surface); color:var(--clr-text);"
            >
          </div>

          <div class="form-group" style="margin-bottom: 24px;">
            <label for="league-motto" style="display:block; margin-bottom:6px; font-weight:600;">Motto / Slogan <span style="color:var(--clr-text-muted); font-weight:400;">(optional)</span></label>
            <input
              type="text"
              id="league-motto"
              name="motto"
              placeholder="e.g. Play hard, quiz harder"
              maxlength="120"
              style="width:100%; box-sizing:border-box; padding:8px; border:1px solid var(--clr-line); border-radius:6px; background:var(--clr-surface); color:var(--clr-text);"
            >
          </div>

          <div id="create-error" style="display:none; color:var(--clr-error); margin-bottom:12px;"></div>

          <div style="display:flex; gap:12px; justify-content:flex-end;">
            <a href="/host/dashboard/leagues/" class="btn btn-outline">Cancel</a>
            <button type="submit" id="btn-submit" class="btn btn-primary">
              <i class="fa-solid fa-plus"></i>
              Create League
            </button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script>
    document.getElementById('create-league-form').addEventListener('submit', async (ev) => {
      ev.preventDefault();
      const name = document.getElementById('league-name').value.trim();
      const motto = document.getElementById('league-motto').value.trim();
      const errEl = document.getElementById('create-error');
      const btn = document.getElementById('btn-submit');

      if (!name) {
        errEl.textContent = 'Please enter a league name.';
        errEl.style.display = '';
        return;
      }

      errEl.style.display = 'none';
      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Creating...';

      try {
        const res = await fetch('/api/league/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, slogan: motto, visuals: { motto } })
        });
        const json = await res.json();
        if (!res.ok) throw new Error(json.error || json.message || 'Create failed');
        window.location.href = '/host/dashboard/leagues/';
      } catch (err) {
        console.error('Create league error:', err);
        errEl.textContent = 'Failed to create league: ' + err.message;
        errEl.style.display = '';
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-plus"></i> Create League';
      }
    });
  </script>
</body>
</html>
