<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Leaderboard - SuperMassive</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <script type="module" src="/modules/dashboard.min.js" defer></script>
    <style>
        .rank-col { width: 60px; text-align: center; }
        .status-col { width: 100px; text-align: center; }
        .player-col { width: auto; }
        .score-col { text-align: right; font-weight: 700; color: var(--clr-accent); width: 120px; }
        .num-col { text-align: right; font-family: monospace; width: 100px; }
        
        .quiz-table { width: 100%; border-collapse: collapse; }
        .quiz-table td { overflow: visible; position: relative; }

        .player-info { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            height: 40px; /* Constrain container, let avatar overflow */
        }
        .player-avatar { 
            width: 36px; 
            height: auto; 
            max-height: 70px; /* Taller than the row! */
            flex-shrink: 0;
            position: relative;
            margin-top: -15px; /* Break upwards into previous row */
            margin-bottom: -5px;
            z-index: 10;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }
        .player-avatar:hover {
            transform: scale(1.1);
            z-index: 20;
        }
        .player-name { font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .verification-badge { 
            font-size: 0.65rem; 
            background: var(--clr-success); 
            color: white; 
            padding: 2px 6px; 
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .verification-badge.not-verified {
            background: var(--clr-bg);
            border: 1px solid var(--clr-border);
            color: var(--clr-text-muted);
        }
        tr.top-rank-1 { background: rgba(245, 158, 11, 0.1); }
        tr.top-rank-1 .player-avatar { 
            filter: drop-shadow(0 0 8px rgba(245, 158, 11, 0.4));
            margin-top: -25px; /* Champion breaks out even more! */
        }
        tr.top-rank-2 { background: rgba(245, 158, 11, 0.05); }
        tr.top-rank-3 { background: rgba(245, 158, 11, 0.02); }

        /* Secondary Grid */
        .secondary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-top: 32px;
        }

        /* Mini Variant Styles */
        .card.mini {
            font-size: 0.85rem;
        }
        .card.mini .player-avatar {
            width: 32px;
            height: 32px;
            margin-top: -5px;
        }
        .card.mini .player-info {
            height: 30px;
            gap: 8px;
        }
        .card.mini .num-col { width: 60px; }
        .card.mini .score-col { width: 80px; }
        .card.mini .status-col { width: 70px; }
        .card.mini .rank-col { width: 40px; }
        .card.mini .quiz-table td, .card.mini .quiz-table th {
            padding: 8px 12px;
        }
        
        @media (max-width: 1200px) {
            .secondary-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body class="dark-theme">
    <nav id="sidebar"></nav>

    <main>
        <div class="editor-header">
            <div>
                <h1>Global Leaderboard</h1>
                <p class="text-muted">The hall of fame for SuperMassive champions.</p>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>All-Time Champions</h2>
            </div>
            <div class="card-body">
                <table class="quiz-table">
                    <thead>
                        <tr>
                            <th class="rank-col">Rank</th>
                            <th class="status-col">Status</th>
                            <th class="player-col">Player</th>
                            <th class="num-col">Games</th>
                            <th class="num-col">Questions</th>
                            <th class="num-col">Correct</th>
                            <th class="score-col">Score</th>
                        </tr>
                    </thead>
                    <tbody id="global-leaderboard">
                        <tr><td colspan="7" style="text-align:center; padding: 40px;">Fetching champion data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="secondary-grid">
            <div class="card mini">
                <div class="card-header flex justify-between items-center">
                    <h2>Trending Players</h2>
                    <span class="text-muted" style="font-size: 0.7rem;">LAST 7 DAYS</span>
                </div>
                <div class="card-body">
                    <table class="quiz-table">
                        <tbody id="trending-leaderboard">
                            <tr><td colspan="7" style="text-align:center; padding: 20px;">Computing trends...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="card mini">
                <div class="card-header flex justify-between items-center">
                    <h2>Winter Season 2026</h2>
                    <span class="text-muted" style="font-size: 0.7rem;">ACTIVE</span>
                </div>
                <div class="card-body">
                    <table class="quiz-table">
                        <tbody id="season-leaderboard">
                            <tr><td colspan="7" style="text-align:center; padding: 20px;">Loading season scores...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        /**
         * Reusable Leaderboard Renderer
         */
        async function loadLeaderboard(targetId, url) {
            const tbody = document.getElementById(targetId);
            if (!tbody) return;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Network response was not ok');
                const players = await response.json();
                
                if (!players || players.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 40px;">No records found yet.</td></tr>';
                    return;
                }

                tbody.innerHTML = players.map((p, i) => {
                    const isMini = tbody.closest('.card').classList.contains('mini');
                    const rankClass = i < 3 ? `top-rank-${i + 1}` : '';
                    const rankDisplay = i === 0 ? '<span style="font-size:1.2rem;">🥇</span>' : i === 1 ? '🥈' : i === 2 ? '🥉' : i + 1;
                    const zIndex = 100 - i;

                    const badge = p.verificationLevel < 2 
                        ? '<span class="verification-badge">Verified</span>' 
                        : '<span class="verification-badge not-verified">Guest</span>';

                    const avatarUrl = p.avatar 
                        ? `/img/avatar-100/image-from-rawpixel-id-${p.avatar}-original.png` 
                        : '/assets/img/default-avatar.png';

                    // Simplify display for mini tables
                    return `
                        <tr class="${rankClass}" style="z-index: ${zIndex}">
                            <td class="rank-col">${rankDisplay}</td>
                            <td class="status-col">${badge}</td>
                            <td>
                                <div class="player-info">
                                    <img src="${avatarUrl}" class="player-avatar" alt="">
                                    <span class="player-name">${p.playerName}</span>
                                </div>
                            </td>
                            ${!isMini ? `
                                <td class="num-col">${p.gameCount}</td>
                                <td class="num-col">${(p.totalQuestions || 0).toLocaleString()}</td>
                                <td class="num-col">${(p.totalCorrect || 0).toLocaleString()}</td>
                            ` : ''}
                            <td class="score-col">${p.totalScore.toLocaleString()}</td>
                        </tr>
                    `;
                }).join('');

            } catch (err) {
                console.error(`Failed to fetch ${targetId}:`, err);
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:var(--clr-error); padding: 20px;">Error loading scores.</td></tr>';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Main Global Leaderboard
            loadLeaderboard('global-leaderboard', '/api/leaderboard/global');
            
            // Secondary Leaderboards (using mock data for demo)
            loadLeaderboard('trending-leaderboard', '/api/leaderboard/global?mock=true');
            loadLeaderboard('season-leaderboard', '/api/leaderboard/global?mock=true');
        });
    </script>
</body>
</html>
