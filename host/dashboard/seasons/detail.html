<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Season Details - SuperMassive</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script type="module" src="/modules/dashboard.min.js" defer></script>
    <style>
        .season-header-area {
            background: var(--clr-surface);
            padding: 2.5rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            border: 1px solid var(--clr-border);
        }

        .season-series-label {
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--clr-accent);
            margin-bottom: 0.5rem;
        }

        .season-header-area h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .season-header-area > p { color: var(--clr-text-muted); font-size: 1rem; max-width: 600px; }

        .season-meta {
            display: flex;
            gap: 1.25rem;
            margin-top: 0.75rem;
            font-size: 0.9rem;
            color: var(--clr-text-muted);
            align-items: center;
            flex-wrap: wrap;
        }

        .header-actions { margin-top: 1.5rem; display: flex; gap: 0.75rem; }

        .active-badge {
            padding: 0.2rem 0.8rem;
            background: rgba(0, 200, 100, 0.15);
            color: #00c864;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .episode-list { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1rem; }

        .episode-row {
            background: var(--clr-surface);
            border: 1px solid var(--clr-border);
            padding: 1rem 1.5rem;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            transition: border-color 0.2s;
            cursor: pointer;
        }

        .episode-row:hover { border-color: var(--clr-accent); }

        .episode-num {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--clr-text-muted);
            opacity: 0.3;
            width: 40px;
        }

        .episode-info { flex: 1; }
        .episode-title { font-weight: 700; font-size: 1.1rem; }
        .episode-quiz-name { font-size: 0.85rem; color: var(--clr-accent); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        .btn-add-episode {
            border: 2px dashed var(--clr-border);
            background: transparent;
            color: var(--clr-text-muted);
            padding: 1.5rem;
            border-radius: 16px;
            cursor: pointer;
            width: 100%;
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .btn-add-episode:hover { border-color: var(--clr-accent); color: var(--clr-accent); }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            place-items: center;
            z-index: 1000;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: var(--clr-surface);
            padding: 2.5rem;
            border-radius: 24px;
            width: 100%;
            max-width: 500px;
            border: 1px solid var(--clr-border);
        }

        .form-group { margin-bottom: 1.5rem; }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 700;
            color: var(--clr-text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group label .opt { font-weight: normal; text-transform: none; letter-spacing: 0; }
        .form-group select, .form-group input, .form-group textarea {
            width: 100%;
            padding: 0.85rem;
            background: var(--clr-bg);
            border: 1px solid var(--clr-border);
            border-radius: 10px;
            color: var(--clr-text);
            font-family: inherit;
            font-size: 0.9rem;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

        .empty-state {
            padding: 4rem;
            text-align: center;
            background: var(--clr-surface);
            border: 2px dashed var(--clr-border);
            border-radius: 20px;
            color: var(--clr-text-muted);
        }
    </style>
</head>
<body class="dashboard-body">
    <div id="sidebar" class="sidebar"></div>

    <main class="main-content">
        <div class="season-header-area">
            <div id="series-label" class="season-series-label" style="display: none;"></div>
            <h1 id="season-name">Loading...</h1>
            <p id="season-desc"></p>
            <div class="season-meta">
                <span id="season-status"></span>
                <span id="season-dates"></span>
            </div>
            <div class="header-actions">
                <button class="btn btn-ghost" onclick="openEditSeasonModal()">
                    <i class="fa-solid fa-pen"></i>
                    Edit Season
                </button>
            </div>
        </div>

        <div id="episode-list" class="episode-list"></div>

        <button class="btn-add-episode" onclick="openAddEpisodeModal()">
            <i class="fa-solid fa-plus"></i>
            Add Episode from Library
        </button>
    </main>

    <!-- Modal: Add Episode -->
    <div id="addEpisodeModal" class="modal-overlay" onclick="if(event.target === this) this.style.display='none'">
        <div class="modal-content">
            <h2 style="margin-bottom: 0.5rem;">Add Episode</h2>
            <p style="color: var(--clr-text-muted); margin-bottom: 2rem; font-size: 0.95rem;">Attach a quiz from your library to this season.</p>
            <form id="addEpisodeForm">
                <div class="form-group">
                    <label>Quiz</label>
                    <select id="quiz-selector" required>
                        <option value="">Select a Quiz...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Episode Label <span class="opt">(Optional)</span></label>
                    <input type="text" id="episode-label" placeholder="e.g. Episode 1: Movie Night">
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="button" class="btn btn-ghost" onclick="document.getElementById('addEpisodeModal').style.display='none'" style="flex: 1;">Cancel</button>
                    <button type="submit" class="btn btn-primary" style="flex: 1;">
                        <i class="fa-solid fa-plus"></i>
                        Add to Season
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal: Edit Episode -->
    <div id="editEpisodeModal" class="modal-overlay" onclick="if(event.target === this) this.style.display='none'">
        <div class="modal-content">
            <h2 style="margin-bottom: 0.4rem;">Edit Episode</h2>
            <p id="edit-episode-quiz-name" style="color: var(--clr-accent); font-size: 0.82rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 1.75rem;"></p>
            <form id="editEpisodeForm">
                <div class="form-group">
                    <label>Episode Label</label>
                    <input type="text" id="edit-episode-label" placeholder="e.g. Episode 1: Movie Night">
                </div>
                <div class="form-group">
                    <label>Air Date <span class="opt">(Optional)</span></label>
                    <input type="date" id="edit-episode-airdate">
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 2rem; align-items: center;">
                    <button type="button" class="btn btn-danger" onclick="deleteEpisode()">
                        <i class="fa-solid fa-trash"></i>
                        Remove
                    </button>
                    <div style="flex: 1;"></div>
                    <button type="button" class="btn btn-ghost" onclick="document.getElementById('editEpisodeModal').style.display='none'">Cancel</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fa-solid fa-floppy-disk"></i>
                        Save
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal: Edit Season -->
    <div id="editSeasonModal" class="modal-overlay" onclick="if(event.target === this) this.style.display='none'">
        <div class="modal-content">
            <h2 style="margin-bottom: 1.5rem;">Edit Season</h2>
            <form id="editSeasonForm">
                <div class="form-group">
                    <label>Season Name</label>
                    <input type="text" id="edit-season-name" required>
                </div>
                <div class="form-group">
                    <label>Series Name <span class="opt">(Optional)</span></label>
                    <input type="text" id="edit-season-seriesname" placeholder="e.g. Pub Quiz @ Home">
                </div>
                <div class="form-group">
                    <label>Description <span class="opt">(Optional)</span></label>
                    <textarea id="edit-season-description" rows="2"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Start Date</label>
                        <input type="date" id="edit-season-startdate">
                    </div>
                    <div class="form-group">
                        <label>End Date</label>
                        <input type="date" id="edit-season-enddate">
                    </div>
                </div>
                <div class="form-group" style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0;">
                    <input type="checkbox" id="edit-season-active" style="width: auto; accent-color: var(--clr-accent); width: 1.1rem; height: 1.1rem;">
                    <label for="edit-season-active" style="margin: 0; text-transform: none; letter-spacing: 0; color: var(--clr-text); font-size: 0.9rem;">Season is Active</label>
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="button" class="btn btn-ghost" onclick="document.getElementById('editSeasonModal').style.display='none'" style="flex: 1;">Cancel</button>
                    <button type="submit" class="btn btn-primary" style="flex: 1;">
                        <i class="fa-solid fa-floppy-disk"></i>
                        Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        const urlParams = new URLSearchParams(window.location.search);
        const seasonId = urlParams.get('id');
        let currentSeasonData = null;
        let selectedEpisodeId = null;

        async function init() {
            if (!seasonId) {
                location.href = '/host/dashboard/seasons/';
                return;
            }
            await loadSeasonData();
            await loadQuizLibrary();
        }

        async function loadSeasonData() {
            try {
                const res = await fetch(`/api/seasons/${seasonId}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const { success, data } = await res.json();
                if (!success) throw new Error('Load failed');

                currentSeasonData = data;

                const seriesLabelEl = document.getElementById('series-label');
                if (data.seriesName) {
                    seriesLabelEl.textContent = data.seriesName;
                    seriesLabelEl.style.display = 'block';
                } else {
                    seriesLabelEl.style.display = 'none';
                }

                document.getElementById('season-name').textContent = data.name;
                document.getElementById('season-desc').textContent = data.description || '';

                document.getElementById('season-status').innerHTML = data.isActive
                    ? '<span class="active-badge"><i class="fa-solid fa-circle" style="font-size:0.45rem; vertical-align:middle; margin-right:3px;"></i>Active</span>'
                    : '<span style="color: var(--clr-text-muted)">Ended</span>';

                const datesEl = document.getElementById('season-dates');
                if (data.startDate || data.endDate) {
                    const fmt = d => new Date(d).toLocaleDateString('en-GB', { month: 'short', year: 'numeric' });
                    datesEl.textContent = [data.startDate && fmt(data.startDate), data.endDate && fmt(data.endDate)]
                        .filter(Boolean).join(' â€“ ');
                } else {
                    datesEl.textContent = '';
                }

                renderEpisodes(data.episodes || []);
            } catch (err) {
                console.error('Failed to load season:', err);
            }
        }

        function renderEpisodes(episodes) {
            const list = document.getElementById('episode-list');
            if (episodes.length === 0) {
                list.innerHTML = '<div class="empty-state"><h3>No Episodes Yet</h3><p>Add a quiz from your library to get started.</p></div>';
                return;
            }

            list.innerHTML = episodes.map((ep, i) => `
                <div class="episode-row" onclick="openEditEpisodeModal('${ep._id}')">
                    <div class="episode-num">${i + 1}</div>
                    <div class="episode-info">
                        <div class="episode-quiz-name">${ep.quizID?.title || 'Unknown Quiz'}</div>
                        <div class="episode-title">${ep.label}</div>
                    </div>
                    <button class="btn btn-primary btn-sm" onclick="event.stopPropagation(); playEpisode('${ep.quizID?._id}')">
                        <i class="fa-solid fa-play"></i>
                        Host Now
                    </button>
                </div>
            `).join('');
        }

        async function loadQuizLibrary() {
            const selector = document.getElementById('quiz-selector');
            try {
                const res = await fetch('/api/quiz');
                const { success, data } = await res.json();
                if (success) {
                    selector.innerHTML = '<option value="">Select a Quiz...</option>' +
                        data.map(q => `<option value="${q._id}">${q.title}</option>`).join('');
                }
            } catch (err) {
                console.error('Failed to load quiz library', err);
            }
        }

        window.openAddEpisodeModal = () => {
            document.getElementById('addEpisodeModal').style.display = 'grid';
        };

        window.openEditEpisodeModal = (episodeId) => {
            selectedEpisodeId = episodeId;
            const ep = currentSeasonData?.episodes?.find(e => e._id === episodeId);
            if (!ep) return;

            document.getElementById('edit-episode-quiz-name').textContent = ep.quizID?.title || 'Unknown Quiz';
            document.getElementById('edit-episode-label').value = ep.label || '';
            document.getElementById('edit-episode-airdate').value = ep.airDate
                ? new Date(ep.airDate).toISOString().split('T')[0]
                : '';
            document.getElementById('editEpisodeModal').style.display = 'grid';
        };

        window.openEditSeasonModal = () => {
            if (!currentSeasonData) return;
            document.getElementById('edit-season-name').value = currentSeasonData.name || '';
            document.getElementById('edit-season-seriesname').value = currentSeasonData.seriesName || '';
            document.getElementById('edit-season-description').value = currentSeasonData.description || '';
            document.getElementById('edit-season-startdate').value = currentSeasonData.startDate
                ? new Date(currentSeasonData.startDate).toISOString().split('T')[0]
                : '';
            document.getElementById('edit-season-enddate').value = currentSeasonData.endDate
                ? new Date(currentSeasonData.endDate).toISOString().split('T')[0]
                : '';
            document.getElementById('edit-season-active').checked = !!currentSeasonData.isActive;
            document.getElementById('editSeasonModal').style.display = 'grid';
        };

        window.playEpisode = (quizId) => {
            location.href = `/host/lobby?quizId=${quizId}&seasonId=${seasonId}`;
        };

        window.deleteEpisode = async () => {
            if (!selectedEpisodeId || !confirm('Remove this episode from the season?')) return;
            try {
                const res = await fetch(`/api/seasons/${seasonId}/episodes/${selectedEpisodeId}`, { method: 'DELETE' });
                const result = await res.json();
                if (result.success) {
                    document.getElementById('editEpisodeModal').style.display = 'none';
                    await loadSeasonData();
                } else {
                    alert(result.message || 'Failed to remove episode.');
                }
            } catch (err) {
                console.error('Delete episode error:', err);
                alert('Network error. Please try again.');
            }
        };

        // Add Episode
        document.getElementById('addEpisodeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const quizID = document.getElementById('quiz-selector').value;
            const label = document.getElementById('episode-label').value;
            if (!quizID) return;

            const btn = e.target.querySelector('[type="submit"]');
            btn.disabled = true;
            try {
                const res = await fetch(`/api/seasons/${seasonId}/episodes`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ quizID, label })
                });
                const result = await res.json();
                if (result.success) {
                    document.getElementById('addEpisodeModal').style.display = 'none';
                    document.getElementById('addEpisodeForm').reset();
                    await loadSeasonData();
                } else {
                    alert(result.message || 'Failed to add episode.');
                }
            } catch (err) {
                console.error('Add episode error:', err);
                alert('Network error. Please try again.');
            } finally {
                btn.disabled = false;
            }
        });

        // Edit Episode
        document.getElementById('editEpisodeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!selectedEpisodeId) return;
            const label = document.getElementById('edit-episode-label').value;
            const airDate = document.getElementById('edit-episode-airdate').value;

            try {
                const res = await fetch(`/api/seasons/${seasonId}/episodes/${selectedEpisodeId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ label, airDate: airDate || null })
                });
                const result = await res.json();
                if (result.success) {
                    document.getElementById('editEpisodeModal').style.display = 'none';
                    await loadSeasonData();
                } else {
                    alert(result.message || 'Failed to save episode.');
                }
            } catch (err) {
                console.error('Edit episode error:', err);
                alert('Network error. Please try again.');
            }
        });

        // Edit Season
        document.getElementById('editSeasonForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const body = {
                name: document.getElementById('edit-season-name').value,
                seriesName: document.getElementById('edit-season-seriesname').value || null,
                description: document.getElementById('edit-season-description').value || null,
                startDate: document.getElementById('edit-season-startdate').value || null,
                endDate: document.getElementById('edit-season-enddate').value || null,
                isActive: document.getElementById('edit-season-active').checked
            };

            try {
                const res = await fetch(`/api/seasons/${seasonId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const result = await res.json();
                if (result.success) {
                    document.getElementById('editSeasonModal').style.display = 'none';
                    await loadSeasonData();
                } else {
                    alert(result.message || 'Failed to save season.');
                }
            } catch (err) {
                console.error('Edit season error:', err);
                alert('Network error. Please try again.');
            }
        });

        init();
    </script>
</body>
</html>
