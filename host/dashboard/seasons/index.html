<!DOCTYPE html>
<html lang="en">

<!-- SEASONS -->
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Seasons - SuperMassive</title>
	<link rel="stylesheet" href="/css/dashboard.css">
	<link rel="stylesheet" href="/css/quizbuilder.css">
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
	<script type="module" src="/modules/dashboard.min.js" defer></script>
</head>

<body class="dashboard-body">
	<div id="sidebar" class="sidebar"></div>

	<main class="main-content">
		<div class="editor-header">
			<h1>Seasons:</h1>
			<div class="flex gap-md">
				<button id="new-season-btn" class="btn btn-accent">
					<i class="fa-solid fa-plus"></i>
					New Season
				</button>
			</div>
		</div>

		<div class="card">
			<div class="card-header">
				<svg class="collapse-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
					stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
					<polyline points="6 9 12 15 18 9"></polyline>
				</svg>
				<h2>My Seasons</h2>
			</div>
			<div class="card-body">
				<section id="season-list" class="season-grid">
					<div class="empty-state">Loading your seasons...</div>
				</section>
			</div>
		</div>

		<div class="card" style="margin-top: 2.5rem;">
			<div class="card-header">
				<svg class="collapse-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
					stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
					<polyline points="6 9 12 15 18 9"></polyline>
				</svg>
				<h2>Public Seasons</h2>
			</div>
			<div class="card-body">
				<section id="public-season-list" class="season-grid">
					<div class="empty-state">Loading public seasons...</div>
				</section>
			</div>
		</div>
	</main>

	<script type="module">
		import { initDashboardSeasons } from '/modules/dashboard-seasons.min.js';
		initDashboardSeasons();
		console.log('Dashboard seasons module initialized');
	</script>

</body>

</html>
