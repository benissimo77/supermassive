<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Show Details - SuperMassive</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <script type="module" src="/modules/dashboard.min.js" defer></script>
    <style>
        .show-header-area {
            background: var(--clr-surface);
            padding: 2.5rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            border: 1px solid var(--clr-border);
            display: flex;
            gap: 2.5rem;
            align-items: flex-start;
        }

        .show-logo-large {
            width: 140px;
            height: 140px;
            background: var(--clr-accent);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            font-weight: 800;
            color: white;
            flex-shrink: 0;
            box-shadow: 0 12px 32px rgba(0,0,0,0.2);
        }

        .show-details h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .show-details p { color: var(--clr-text-muted); font-size: 1.1rem; line-height: 1.6; max-width: 600px; }

        .season-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            background: var(--clr-surface);
            padding: 0.5rem;
            border-radius: 12px;
            width: fit-content;
        }

        .season-tab {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            color: var(--clr-text-muted);
            transition: all 0.2s;
        }

        .season-tab.active {
            background: var(--clr-accent);
            color: white;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 2rem;
        }

        .episode-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .episode-row {
            background: var(--clr-surface);
            border: 1px solid var(--clr-border);
            padding: 1rem 1.5rem;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            transition: all 0.2s;
        }

        .episode-row:hover {
            border-color: var(--clr-accent);
            background: rgba(255, 255, 255, 0.02);
        }

        .episode-num {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--clr-text-muted);
            opacity: 0.3;
            width: 40px;
        }

        .episode-info { flex: 1; }
        .episode-title { font-weight: 700; font-size: 1.1rem; }
        .episode-quiz-name { font-size: 0.85rem; color: var(--clr-accent); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        .btn-add-episode {
            border: 2px dashed var(--clr-border);
            background: transparent;
            color: var(--clr-text-muted);
            padding: 2rem;
            border-radius: 16px;
            cursor: pointer;
            width: 100%;
            font-weight: 700;
            font-size: 1.1rem;
            margin-top: 1rem;
        }

        .btn-add-episode:hover {
            border-color: var(--clr-accent);
            color: var(--clr-accent);
        }

        .sidebar-card {
            background: var(--clr-surface);
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid var(--clr-border);
            margin-bottom: 2rem;
        }

        /* Modal simple styling */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            place-items: center;
            z-index: 1000;
            backdrop-filter: blur(8px);
        }
        .modal-content {
            background: var(--clr-surface);
            padding: 2.5rem;
            border-radius: 24px;
            width: 100%;
            max-width: 500px;
            border: 1px solid var(--clr-border);
        }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 700; color: var(--clr-text-muted); font-size: 0.9rem; }
        .form-group select, .form-group input {
            width: 100%;
            padding: 0.85rem;
            background: var(--clr-bg);
            border: 1px solid var(--clr-border);
            border-radius: 10px;
            color: var(--clr-text);
            font-family: inherit;
        }
    </style>
</head>
<body class="dashboard-body">
    <div id="sidebar" class="sidebar"></div>
    
    <main class="main-content">
        <div id="show-header" class="show-header-area">
            <div class="show-logo-large">?</div>
            <div class="show-details">
                <h1 id="show-title">Loading...</h1>
                <p id="show-desc"></p>
                <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                    <button class="btn btn-primary">Edit Brand</button>
                    <button class="btn btn-secondary">Season Settings</button>
                </div>
            </div>
        </div>

        <div class="content-grid">
            <div class="main-column">
                <div class="season-tabs" id="season-tabs"></div>

                <div id="episode-list" class="episode-list">
                    <!-- Episodes injected here -->
                </div>
                
                <button class="btn-add-episode" onclick="openAddEpisodeModal()">
                    + Add Episode from Library
                </button>
            </div>

            <div class="side-column">
                <div class="sidebar-card">
                    <h3 style="margin-bottom: 1rem;">Series Links</h3>
                    <p style="font-size: 0.9rem; color: var(--clr-text-muted); margin-bottom: 1.5rem;">
                        Share the series hub with your audience to show all-time rankings.
                    </p>
                    <button class="btn btn-secondary" style="width: 100%;">Copy Landing Link</button>
                </div>

                <div class="sidebar-card">
                    <h3 style="margin-bottom: 1rem;">Active Season</h3>
                    <div id="active-season-summary" style="font-size: 0.9rem;">
                        <strong>Season 1</strong><br>
                        <span style="color: var(--clr-text-muted);">Dec 2025 - Mar 2026</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal: Add Episode -->
    <div id="addEpisodeModal" class="modal-overlay" onclick="if(event.target === this) this.style.display='none'">
        <div class="modal-content">
            <h2 style="margin-bottom: 1rem;">Add Episode</h2>
            <p style="color: var(--clr-text-muted); margin-bottom: 2rem;">Attach a quiz from your library to this season.</p>
            
            <form id="addEpisodeForm">
                <div class="form-group">
                    <label>Quiz Library</label>
                    <select id="quiz-selector" required>
                        <option value="">Select a Quiz...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Episode Title</label>
                    <input type="text" id="episode-label" placeholder="e.g. Episode 1: Movie Night" required>
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 2.5rem;">
                    <button type="button" class="btn btn-secondary" onclick="document.getElementById('addEpisodeModal').style.display='none'" style="flex: 1;">Cancel</button>
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Add to Season</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        const urlParams = new URLSearchParams(window.location.search);
        const showId = urlParams.get('id');
        let currentShowData = null;
        let activeSeasonId = null;

        async function init() {
            if (!showId) {
                location.href = '/host/dashboard/shows';
                return;
            }
            await loadShowData();
            await loadQuizLibrary();
        }

        async function loadShowData() {
            try {
                const res = await fetch(`/api/shows/${showId}`);
                const { success, data } = await res.json();
                if (!success) throw new Error("Load failed");

                currentShowData = data;
                document.getElementById('show-title').textContent = data.title;
                document.getElementById('show-desc').textContent = data.description || 'Branded quiz series.';
                document.querySelector('.show-logo-large').textContent = data.title.charAt(0);
                document.querySelector('.show-logo-large').style.background = data.visuals?.accentColor || 'var(--clr-accent)';

                renderSeasons(data.seasons);
            } catch (err) {
                console.error(err);
            }
        }

        function renderSeasons(seasons) {
            const tabs = document.getElementById('season-tabs');
            tabs.innerHTML = seasons.map((s, i) => `
                <div class="season-tab ${i === 0 ? 'active' : ''}" onclick="selectSeason('${s._id}')">
                    ${s.name}
                </div>
            `).join('');

            activeSeasonId = seasons[0]?._id;
            renderEpisodes(seasons[0]?.episodes || []);
        }

        function renderEpisodes(episodes) {
            const list = document.getElementById('episode-list');
            if (episodes.length === 0) {
                list.innerHTML = '<div class="empty-state">No episodes added to this season.</div>';
                return;
            }

            list.innerHTML = episodes.map((ep, i) => `
                <div class="episode-row">
                    <div class="episode-num">${i + 1}</div>
                    <div class="episode-info">
                        <div class="episode-quiz-name">${ep.quizID?.title || 'Unknown Quiz'}</div>
                        <div class="episode-title">${ep.label}</div>
                    </div>
                    <button class="btn btn-primary btn-sm" onclick="playEpisode('${ep.quizID?._id}')">Host Now</button>
                </div>
            `).join('');
        }

        async function loadQuizLibrary() {
            const selector = document.getElementById('quiz-selector');
            try {
                const res = await fetch('/api/quiz');
                const { success, data } = await res.json();
                if (success) {
                    selector.innerHTML = '<option value="">Select a Quiz...</option>' + 
                        data.map(q => `<option value="${q._id}">${q.title}</option>`).join('');
                }
            } catch (err) {
                console.error("Failed to load library", err);
            }
        }

        window.openAddEpisodeModal = () => {
            document.getElementById('addEpisodeModal').style.display = 'grid';
        };

        window.playEpisode = (quizId) => {
            // Redirect to host screen with context
            window.location.href = `/host/lobby?quizId=${quizId}&showId=${showId}&seasonId=${activeSeasonId}`;
        };

        document.getElementById('addEpisodeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const quizID = document.getElementById('quiz-selector').value;
            const label = document.getElementById('episode-label').value;

            try {
                const res = await fetch(`/api/shows/${showId}/seasons/${activeSeasonId}/episodes`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ quizID, label })
                });
                const result = await res.json();
                if (result.success) {
                    document.getElementById('addEpisodeModal').style.display = 'none';
                    loadShowData();
                }
            } catch (err) {
                alert("Error adding episode");
            }
        });

        init();
    </script>
</body>
</html>
